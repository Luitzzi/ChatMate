services:
  chatserver:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      TOKEN_SECRET: ${TOKEN_SECRET}
      TOKEN_EXPIRATION_TIME: ${TOKEN_EXPIRATION_TIME}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
    container_name: chatmate
    depends_on:
      - chatmate-postgres
    ports:
      - "8080:8080"
      - "9090:9090"
    networks:
      - chatnet

  chatmate-postgres:
    image: postgres:latest
    container_name: chatmate-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - chatmate_postgres_data:/var/lib/postgresql
    restart: always
    networks:
      - chatnet

volumes:
  chatmate_postgres_data:
    driver: local

networks:
  chatnet:
    driver: bridge
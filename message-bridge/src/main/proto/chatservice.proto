syntax = "proto3";
package de.luisgerlinger.grpc;
option java_multiple_files = true;
import "google/protobuf/timestamp.proto";

enum MessageType {
  GLOBAL = 0;
  GROUP = 1;
  PRIVATE = 2;
  AUTH = 3;
}

message OutgoingMessage {
  MessageType type = 1;
  string senderId = 2;
  string senderName = 3;
  string targetId = 4;
  string message = 5;
  google.protobuf.Timestamp timestamp = 6;
}

message IncomingMessage {
  MessageType type = 1;
  string targetId = 2;
  string message = 3;
  google.protobuf.Timestamp timestamp = 4;
}

service MessageService {
  rpc sendMessage (stream IncomingMessage) returns (stream OutgoingMessage);
}